<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학생 데이터 분석 보고서</title>
<style>
  :root{--ink:#1f2937;--muted:#6b7280;--line:#e5e7eb;--accent:#4f46e5;--accent2:#06b6d4;
        --good:#16a34a;--warn:#d97706;--bad:#dc2626}
  *{box-sizing:border-box}
  body{margin:0;background:#eef1f6;font-family:"Segoe UI","Malgun Gothic",serif;color:var(--ink)}
  .page{max-width:820px;margin:24px auto;background:#fff;padding:48px 56px;
        box-shadow:0 4px 24px rgba(0,0,0,.08);border-radius:6px}
  .doc-head{border-bottom:3px solid var(--accent);padding-bottom:18px;margin-bottom:8px}
  .doc-head .kicker{color:var(--accent);font-weight:700;letter-spacing:2px;font-size:12px}
  .doc-head h1{margin:6px 0 4px;font-size:28px}
  .meta{color:var(--muted);font-size:13px}
  h2{font-size:18px;border-left:5px solid var(--accent2);padding-left:10px;margin:34px 0 14px}
  p{line-height:1.75;font-size:14.5px}
  .summary{background:#f5f7ff;border:1px solid #e0e4f5;border-radius:10px;padding:18px 22px;margin:18px 0}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}
  .kpi{border:1px solid var(--line);border-radius:10px;padding:14px;text-align:center}
  .kpi .v{font-size:22px;font-weight:700;color:var(--accent)}
  .kpi .l{font-size:12px;color:var(--muted);margin-top:4px}
  table{width:100%;border-collapse:collapse;font-size:13.5px;margin:14px 0}
  th,td{border:1px solid var(--line);padding:8px 10px;text-align:center}
  th{background:#f3f4f6}
  td.l{text-align:left}
  .bar-row{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13px}
  .bar-row .name{width:56px;color:var(--muted)}
  .bar-track{flex:1;background:#eef2f7;border-radius:6px;height:18px;overflow:hidden}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .bar-row .num{width:40px;text-align:right}
  ul{line-height:1.8;font-size:14.5px}
  .pill{display:inline-block;padding:1px 8px;border-radius:999px;font-size:12px;font-weight:600}
  .p-good{background:#dcfce7;color:var(--good)}.p-mid{background:#fef3c7;color:var(--warn)}.p-low{background:#fee2e2;color:var(--bad)}
  .noprint{text-align:center;margin:20px}
  .btn{background:var(--accent);color:#fff;border:0;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer}
  footer{color:var(--muted);font-size:12px;text-align:center;border-top:1px solid var(--line);margin-top:36px;padding-top:14px}
  .err{background:#fee2e2;color:var(--bad);padding:14px;border-radius:10px}
  @media print{body{background:#fff}.page{box-shadow:none;margin:0;max-width:100%}.noprint{display:none}}
</style>
</head>
<body>
<div class="noprint"><button class="btn" onclick="window.print()">🖨️ 보고서 인쇄 / PDF 저장</button></div>
<div class="page" id="doc"><p>보고서를 생성하는 중…</p></div>

<script>
const SUBJECTS=["국어","영어","수학","과학","사회"];
const avg=a=>a.reduce((s,x)=>s+x,0)/a.length;

// students.csv 데이터를 직접 내장 (file:// 로 열어도 동작하도록)
const CSV_DATA=`학번,이름,성별,학년,반,국어,영어,수학,과학,사회,출석일수
2026001,김민준,남,1,2,98,58,80,97,99,186
2026002,이서연,여,1,3,59,65,95,51,58,187
2026003,박도윤,남,1,4,85,60,73,89,65,181
2026004,최지우,여,1,4,95,55,70,66,77,183
2026005,정하준,남,3,4,72,77,82,54,52,183
2026006,강서윤,여,1,4,51,54,53,71,53,184
2026007,조예준,남,2,2,80,79,52,67,51,187
2026008,윤지호,여,1,3,91,96,53,95,79,177
2026009,장수아,남,2,4,73,73,73,88,70,179
2026010,임건우,여,2,3,92,97,95,52,95,183
2026011,한지민,남,1,1,58,66,84,69,51,180
2026012,오유진,여,2,2,97,84,95,50,71,178
2026013,신동현,남,2,2,63,70,71,98,71,180
2026014,권채원,여,3,3,69,90,52,78,60,180
2026015,황시우,남,3,2,77,89,94,79,84,188
2026016,안예은,여,3,2,96,59,56,62,50,181
2026017,송재원,남,1,2,64,72,76,51,84,188
2026018,전하은,여,1,4,98,61,67,61,51,180
2026019,홍준서,남,2,2,87,61,63,77,74,180
2026020,고나윤,여,3,1,99,83,63,54,90,189
2026021,문서준,남,2,3,50,98,74,80,55,181
2026022,양지안,여,3,1,71,68,62,62,91,189
2026023,배현우,남,2,2,70,93,58,70,52,176
2026024,백다은,여,1,1,99,85,77,91,98,189
2026025,유주원,남,2,4,76,52,82,87,69,182
2026026,남시연,여,2,3,96,74,57,64,75,184
2026027,심우진,남,2,1,78,76,92,68,56,188
2026028,노하린,여,1,1,87,75,93,90,72,186
2026029,하지훈,남,2,3,71,76,85,87,70,180
2026030,곽서아,여,3,2,57,99,85,89,52,189`;

function load(){
  try{
    build(parse(CSV_DATA));
  }catch(e){
    document.getElementById("doc").innerHTML=
      '<div class="err">데이터를 처리하지 못했습니다: '+e.message+'</div>';
  }
}
function parse(text){
  const lines=text.trim().split(/\r?\n/), head=lines[0].split(",");
  return lines.slice(1).map(line=>{
    const c=line.split(","),o={}; head.forEach((h,i)=>o[h]=c[i]);
    ["학년","반","국어","영어","수학","과학","사회","출석일수"].forEach(k=>o[k]=Number(o[k]));
    o.총점=SUBJECTS.reduce((s,k)=>s+o[k],0); o.평균=+(o.총점/SUBJECTS.length).toFixed(1);
    return o;
  });
}

function build(students){
  const totalAvg=avg(students.map(s=>s.평균));
  const attAvg=avg(students.map(s=>s.출석일수));
  const sorted=[...students].sort((a,b)=>b.총점-a.총점);
  const top=sorted[0], low=sorted[sorted.length-1];
  const male=students.filter(s=>s.성별==="남").length;

  const subjAvg=SUBJECTS.map(sub=>({sub,m:avg(students.map(s=>s[sub]))}))
                        .sort((a,b)=>b.m-a.m);
  const best=subjAvg[0], worst=subjAvg[subjAvg.length-1];

  const grades=[1,2,3].map(g=>{
    const gs=students.filter(s=>s.학년===g);
    return {g,n:gs.length,m:gs.length?avg(gs.map(s=>s.평균)):0};
  });

  const dist={
    good:students.filter(s=>s.평균>=80).length,
    mid:students.filter(s=>s.평균>=65&&s.평균<80).length,
    low:students.filter(s=>s.평균<65).length
  };
  const today=new Date().toISOString().slice(0,10);

  document.getElementById("doc").innerHTML=`
    <div class="doc-head">
      <div class="kicker">JEJU VIVE CODING CAMP 2026</div>
      <h1>학생 데이터 분석 보고서</h1>
      <div class="meta">분석 대상: 전교생 ${students.length}명 · 작성일: ${today} · 데이터 출처: students.csv</div>
    </div>

    <div class="summary">
      <b>요약</b> — 전체 ${students.length}명 학생의 5개 과목 평균은 <b>${totalAvg.toFixed(1)}점</b>,
      평균 출석일수는 <b>${attAvg.toFixed(1)}일</b>이다.
      과목 중 <b>${best.sub}</b>(${best.m.toFixed(1)}점)의 성취도가 가장 높고,
      <b>${worst.sub}</b>(${worst.m.toFixed(1)}점)가 가장 낮아 보완이 필요하다.
      최고 득점자는 <b>${top.이름}</b>(총점 ${top.총점})이다.
    </div>

    <div class="kpis">
      <div class="kpi"><div class="v">${students.length}</div><div class="l">총 학생 수</div></div>
      <div class="kpi"><div class="v">${totalAvg.toFixed(1)}</div><div class="l">전체 평균</div></div>
      <div class="kpi"><div class="v">${attAvg.toFixed(1)}</div><div class="l">평균 출석일</div></div>
      <div class="kpi"><div class="v">${male}:${students.length-male}</div><div class="l">남 : 여</div></div>
    </div>

    <h2>1. 과목별 성취도</h2>
    <p>과목별 평균 점수를 높은 순으로 정렬하면 다음과 같다.
       상위 과목과 하위 과목의 격차는 <b>${(best.m-worst.m).toFixed(1)}점</b>이다.</p>
    ${subjAvg.map(x=>`<div class="bar-row"><span class="name">${x.sub}</span>
      <span class="bar-track"><span class="bar-fill" style="width:${x.m}%"></span></span>
      <span class="num">${x.m.toFixed(1)}</span></div>`).join("")}

    <h2>2. 학년별 비교</h2>
    <table>
      <thead><tr><th>학년</th><th>인원</th><th>평균점수</th><th>평가</th></tr></thead>
      <tbody>${grades.map(g=>`<tr>
        <td>${g.g}학년</td><td>${g.n}명</td><td>${g.m.toFixed(1)}</td>
        <td>${g.m>=80?'<span class="pill p-good">우수</span>':g.m>=65?'<span class="pill p-mid">보통</span>':'<span class="pill p-low">노력</span>'}</td>
      </tr>`).join("")}</tbody>
    </table>

    <h2>3. 성적 등급 분포</h2>
    <table>
      <thead><tr><th>등급</th><th>기준(평균)</th><th>인원</th><th>비율</th></tr></thead>
      <tbody>
        <tr><td><span class="pill p-good">우수</span></td><td>80점 이상</td><td>${dist.good}명</td><td>${(dist.good/students.length*100).toFixed(0)}%</td></tr>
        <tr><td><span class="pill p-mid">보통</span></td><td>65~79점</td><td>${dist.mid}명</td><td>${(dist.mid/students.length*100).toFixed(0)}%</td></tr>
        <tr><td><span class="pill p-low">노력</span></td><td>65점 미만</td><td>${dist.low}명</td><td>${(dist.low/students.length*100).toFixed(0)}%</td></tr>
      </tbody>
    </table>

    <h2>4. 상위 5명 / 하위 5명</h2>
    <table>
      <thead><tr><th>순위</th><th>이름</th><th>학년</th><th>총점</th><th>평균</th><th>출석</th></tr></thead>
      <tbody>${sorted.slice(0,5).map((s,i)=>`<tr>
        <td>${i+1}</td><td class="l">${s.이름}</td><td>${s.학년}</td><td><b>${s.총점}</b></td><td>${s.평균}</td><td>${s.출석일수}</td>
      </tr>`).join("")}</tbody>
    </table>
    <table>
      <thead><tr><th>하위</th><th>이름</th><th>학년</th><th>총점</th><th>평균</th><th>출석</th></tr></thead>
      <tbody>${sorted.slice(-5).reverse().map((s,i)=>`<tr>
        <td>${i+1}</td><td class="l">${s.이름}</td><td>${s.학년}</td><td>${s.총점}</td><td>${s.평균}</td><td>${s.출석일수}</td>
      </tr>`).join("")}</tbody>
    </table>

    <h2>5. 분석 및 제언</h2>
    <ul>
      <li>전체 평균 ${totalAvg.toFixed(1)}점으로, 우수(${dist.good}명)·보통(${dist.mid}명)·노력(${dist.low}명) 구간에 고르게 분포한다.</li>
      <li><b>${worst.sub}</b> 과목의 평균(${worst.m.toFixed(1)}점)이 가장 낮아 보충 학습 및 맞춤 지도가 필요하다.</li>
      <li>학년별로는 ${[...grades].sort((a,b)=>b.m-a.m)[0].g}학년의 평균이 가장 높다. 학년 간 학습 격차 관리가 요구된다.</li>
      <li>출석일수 평균은 ${attAvg.toFixed(1)}일로 전반적으로 양호하며, 성적 하위권 학생의 출결 상태를 함께 점검할 필요가 있다.</li>
    </ul>

    <footer>본 보고서는 students.csv 데이터를 자동 집계하여 생성되었습니다 · JejuViveCodingCamp2026</footer>
  `;
}
load();
</script>
</body>
</html>
